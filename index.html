<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小学英语单词练习</title>
  <style>
    :root {
      --bg: #f7f4ea;
      --ink: #263238;
      --muted: #64706d;
      --line: #d9d4c5;
      --paper: #fffdf6;
      --green: #2f8f63;
      --blue: #2c6da3;
      --red: #c84c4c;
      --gold: #d99a2b;
      --shadow: 0 16px 45px rgba(38, 50, 56, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(47, 143, 99, .08), transparent 32%),
        linear-gradient(315deg, rgba(44, 109, 163, .10), transparent 36%),
        var(--bg);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .app {
      width: min(1120px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(76px, 1fr));
      gap: 8px;
      min-width: min(380px, 100%);
    }

    .stat {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 246, .78);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      color: var(--blue);
    }

    .stat span {
      font-size: 12px;
      color: var(--muted);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .control {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--paper);
      color: var(--ink);
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 14px;
      align-items: start;
    }

    .practice {
      min-height: 540px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--line);
      background: #ece6d6;
    }

    .tab {
      height: 48px;
      border-right: 1px solid var(--line);
      font-weight: 700;
      background: transparent;
    }

    .tab:last-child { border-right: 0; }
    .tab.active {
      background: var(--paper);
      color: var(--green);
    }

    .card-area {
      padding: clamp(18px, 4vw, 34px);
    }

    .word-card {
      min-height: 330px;
      display: grid;
      place-items: center;
      border: 1px solid #e3decf;
      border-radius: 8px;
      background: linear-gradient(180deg, #fffef9, #faf4e5);
      text-align: center;
      padding: 24px;
    }

    .word {
      margin: 0;
      font-size: clamp(44px, 9vw, 86px);
      line-height: 1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .phonetic {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 18px;
    }

    .meaning {
      margin: 18px 0 0;
      font-size: clamp(24px, 4vw, 36px);
      color: var(--green);
      font-weight: 800;
    }

    .example {
      max-width: 620px;
      margin: 20px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      min-height: 46px;
      border-radius: 8px;
      padding: 0 14px;
      background: #ece6d6;
      font-weight: 800;
      transition: transform .12s ease, filter .12s ease;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(.98); }
    .btn.primary { background: var(--green); color: #fff; }
    .btn.blue { background: var(--blue); color: #fff; }
    .btn.gold { background: var(--gold); color: #251c10; }
    .btn.red { background: var(--red); color: #fff; }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .choice {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf0;
      padding: 12px;
      font-size: 20px;
      font-weight: 800;
    }

    .choice.correct { background: #dff2e4; border-color: #80bf8d; }
    .choice.wrong { background: #f8dddd; border-color: #db8d8d; }

    .spell-box {
      display: grid;
      gap: 12px;
      max-width: 560px;
      margin: 18px auto 0;
    }

    .spell-box input {
      height: 54px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 24px;
      text-align: center;
      background: #fff;
    }

    .spell-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .feedback {
      min-height: 30px;
      margin-top: 12px;
      text-align: center;
      font-weight: 800;
      color: var(--blue);
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 246, .9);
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .daily {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .dot {
      aspect-ratio: 1;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #ece6d6;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .dot.done {
      background: var(--green);
      color: #fff;
    }

    .report {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .report-cell {
      border-radius: 8px;
      background: #f3eedf;
      padding: 10px;
      text-align: center;
    }

    .report-cell strong {
      display: block;
      color: var(--blue);
      font-size: 20px;
    }

    .weak-list {
      margin: 0;
      padding-left: 18px;
    }

    .copy-note {
      min-height: 20px;
      color: var(--green);
      font-weight: 800;
      text-align: center;
    }

    .word-list {
      display: grid;
      gap: 7px;
      max-height: 290px;
      overflow: auto;
      padding-right: 4px;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      background: #f3eedf;
      font-size: 14px;
    }

    .list-item em {
      font-style: normal;
      color: var(--green);
      font-weight: 800;
    }

    .answer-guard {
      min-height: 160px;
      display: grid;
      place-items: center;
      border: 1px dashed #cfc7b5;
      border-radius: 8px;
      padding: 18px;
      background: #f3eedf;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      font-weight: 700;
    }

    .hidden { display: none; }

    @media (max-width: 860px) {
      header {
        display: grid;
        align-items: start;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .main {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .app {
        width: min(100vw - 16px, 1120px);
        padding-top: 10px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .quiz-grid {
        grid-template-columns: 1fr;
      }

      .mode-tabs {
        grid-template-columns: 1fr;
      }

      .spell-actions {
        grid-template-columns: 1fr;
      }

      .tab {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>小学英语单词练习</h1>
        <p class="subtitle">三年级也能自己用：听、认、拼、复习，进度保存在这台电脑上。</p>
      </div>
      <section class="stats" aria-label="学习统计">
        <div class="stat"><strong id="learnedCount">0</strong><span>认识</span></div>
        <div class="stat"><strong id="spellCount">0</strong><span>拼对</span></div>
        <div class="stat"><strong id="streakCount">0</strong><span>连续天</span></div>
      </section>
    </header>

    <section class="toolbar" aria-label="筛选">
      <div class="control">
        <label for="gradeFilter">年级</label>
        <select id="gradeFilter">
          <option value="all">小学全部</option>
          <option value="3" selected>三年级重点</option>
          <option value="4">四年级重点</option>
          <option value="5">五年级重点</option>
          <option value="6">六年级重点</option>
        </select>
      </div>
      <div class="control">
        <label for="topicFilter">主题</label>
        <select id="topicFilter">
          <option value="all">全部主题</option>
        </select>
      </div>
      <div class="control">
        <label for="orderMode">顺序</label>
        <select id="orderMode">
          <option value="smart">优先复习不熟的</option>
          <option value="random">随机练习</option>
          <option value="az">A 到 Z</option>
        </select>
      </div>
      <div class="control">
        <label for="voiceSpeed">语速</label>
        <select id="voiceSpeed">
          <option value="0.75">慢速</option>
          <option value="0.9" selected>正常偏慢</option>
          <option value="1">正常</option>
        </select>
      </div>
    </section>

    <section class="main">
      <div class="practice">
        <nav class="mode-tabs" aria-label="练习模式">
          <button class="tab active" data-mode="flash">单词卡</button>
          <button class="tab" data-mode="quiz">认意思</button>
          <button class="tab" data-mode="spell">拼写</button>
        </nav>

        <div class="card-area">
          <section id="flashMode">
            <div class="word-card">
              <div>
                <p class="word" id="wordText">apple</p>
                <p class="phonetic" id="phoneticText">/ˈæpəl/</p>
                <p class="meaning" id="meaningText">苹果</p>
                <p class="example" id="exampleText">I eat an apple.</p>
              </div>
            </div>
            <div class="actions">
              <button class="btn blue" id="speakBtn">听发音</button>
              <button class="btn gold" id="hideBtn">遮住中文</button>
              <button class="btn primary" id="knowBtn">认识</button>
              <button class="btn red" id="againBtn">再练</button>
            </div>
          </section>

          <section id="quizMode" class="hidden">
            <div class="word-card">
              <div>
                <p class="word" id="quizWord">book</p>
                <p class="phonetic" id="quizPhonetic">/bʊk/</p>
                <p class="example" id="quizExample">Open your book.</p>
              </div>
            </div>
            <div class="quiz-grid" id="choices"></div>
            <p class="feedback" id="quizFeedback"></p>
          </section>

          <section id="spellMode" class="hidden">
            <div class="word-card">
              <div>
                <p class="meaning" id="spellMeaning">书</p>
                <p class="example" id="spellExample">Open your ____.</p>
              </div>
            </div>
            <div class="spell-box">
              <input id="spellInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="输入英文单词" />
              <div class="spell-actions">
                <button class="btn blue" id="spellSpeakBtn">听句子</button>
                <button class="btn primary" id="checkSpellBtn">检查拼写</button>
              </div>
            </div>
            <p class="feedback" id="spellFeedback"></p>
          </section>
        </div>
      </div>

      <aside class="side">
        <section class="panel">
          <h2>今日小目标</h2>
          <div class="daily" id="dailyDots"></div>
        </section>
        <section class="panel">
          <h2>家长报告</h2>
          <div class="report">
            <div class="report-grid">
              <div class="report-cell"><strong id="todayDone">0</strong><span>今日完成</span></div>
              <div class="report-cell"><strong id="weakCount">0</strong><span>待复习</span></div>
            </div>
            <div>
              <strong>需要关注</strong>
              <ol class="weak-list" id="weakList"></ol>
            </div>
            <button class="btn blue" id="copyReportBtn">复制报告</button>
            <div class="copy-note" id="copyNote"></div>
          </div>
        </section>
        <section class="panel">
          <h2 id="wordListTitle">当前词表</h2>
          <div class="word-list" id="wordList"></div>
        </section>
      </aside>
    </section>
  </main>

    `.trim();

    const words = vocabText.split("\n").map(line => {
      const [word, meaning, example, phonetic, grade, topic] = line.split("|");
      return { word, meaning, example, phonetic, grade: Number(grade), topic };
    });

    const state = {
      mode: "flash",
      index: 0,
      hiddenMeaning: false,
      filtered: [],
      quizAnswered: false,
      progress: JSON.parse(localStorage.getItem("kidsVocabProgress") || "{}")
    };

    const el = id => document.getElementById(id);
    const todayKey = new Date().toISOString().slice(0, 10);

    function saveProgress() {
      localStorage.setItem("kidsVocabProgress", JSON.stringify(state.progress));
      updateStats();
      renderList();
      renderDaily();
      renderParentReport();
    }

    function getRecord(word) {
      if (!state.progress[word]) state.progress[word] = { know: 0, spell: 0, again: 0 };
      return state.progress[word];
    }

    function filteredWords() {
      const grade = el("gradeFilter").value;
      const topic = el("topicFilter").value;
      let list = words.filter(item => (grade === "all" || String(item.grade) === grade) && (topic === "all" || item.topic === topic));
      const order = el("orderMode").value;
      if (order === "az") list = list.slice().sort((a, b) => a.word.localeCompare(b.word));
      if (order === "random") list = shuffle(list);
      if (order === "smart") {
        list = list.slice().sort((a, b) => {
          const ar = getRecord(a.word);
          const br = getRecord(b.word);
          return (ar.know + ar.spell - ar.again) - (br.know + br.spell - br.again);
        });
      }
      return list;
    }

    function shuffle(list) {
      const copy = list.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function current() {
      if (!state.filtered.length) state.filtered = filteredWords();
      return state.filtered[state.index % state.filtered.length] || words[0];
    }

    function next() {
      state.index = (state.index + 1) % state.filtered.length;
      state.hiddenMeaning = false;
      renderMode();
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = Number(el("voiceSpeed").value);
      window.speechSynthesis.speak(utter);
    }

    function markDaily() {
      const rec = state.progress._daily || {};
      rec[todayKey] = Math.min(DAILY_TARGET, (rec[todayKey] || 0) + 1);
      state.progress._daily = rec;
    }

    function renderFlash() {
      const item = current();
      el("wordText").textContent = item.word;
      el("phoneticText").textContent = item.phonetic;
      el("meaningText").textContent = state.hiddenMeaning ? "____" : item.meaning;
      el("exampleText").textContent = item.example;
      el("hideBtn").textContent = state.hiddenMeaning ? "显示中文" : "遮住中文";
    }

    function renderQuiz() {
      const item = current();
      el("quizWord").textContent = item.word;
      el("quizPhonetic").textContent = item.phonetic;
      el("quizExample").textContent = item.example;
      el("quizFeedback").textContent = "";
      state.quizAnswered = false;
      const pool = shuffle(words.filter(w => w.word !== item.word)).slice(0, 3).concat(item);
      el("choices").innerHTML = "";
      shuffle(pool).forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice";
        button.textContent = choice.meaning;
        button.addEventListener("click", () => {
          if (state.quizAnswered) return;
          state.quizAnswered = true;
          if (choice.word === item.word) {
            button.classList.add("correct");
            el("quizFeedback").textContent = "答对了！";
            getRecord(item.word).know += 1;
            markDaily();
            saveProgress();
            setTimeout(next, 700);
          } else {
            button.classList.add("wrong");
            el("quizFeedback").textContent = `再记一下：${item.word} 是 ${item.meaning}`;
            getRecord(item.word).again += 1;
            saveProgress();
          }
        });
        el("choices").appendChild(button);
      });
    }

    function renderSpell() {
      const item = current();
      el("spellMeaning").textContent = item.meaning;
      el("spellExample").textContent = item.example.replace(new RegExp(item.word, "ig"), "____");
      el("spellInput").value = "";
      el("spellFeedback").textContent = "";
      setTimeout(() => el("spellInput").focus(), 30);
    }

    function renderMode() {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.mode === state.mode));
      el("flashMode").classList.toggle("hidden", state.mode !== "flash");
      el("quizMode").classList.toggle("hidden", state.mode !== "quiz");
      el("spellMode").classList.toggle("hidden", state.mode !== "spell");
      if (state.mode === "flash") renderFlash();
      if (state.mode === "quiz") renderQuiz();
      if (state.mode === "spell") renderSpell();
      renderList();
    }

    function resetFilter() {
      state.filtered = filteredWords();
      state.index = 0;
      renderMode();
      renderList();
    }

    function renderTopics() {
      const select = el("topicFilter");
      const old = select.value;
      const topics = [...new Set(words.map(w => w.topic))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      select.innerHTML = '<option value="all">全部主题</option>' + topics.map(topic => `<option value="${topic}">${topic}</option>`).join("");
      select.value = topics.includes(old) ? old : "all";
    }

    function updateStats() {
      const entries = Object.entries(state.progress).filter(([key]) => !key.startsWith("_"));
      el("learnedCount").textContent = entries.filter(([, rec]) => rec.know > 0).length;
      el("spellCount").textContent = entries.filter(([, rec]) => rec.spell > 0).length;
      const daily = state.progress._daily || {};
      let streak = 0;
      const date = new Date();
      while (daily[date.toISOString().slice(0, 10)] > 0) {
        streak += 1;
        date.setDate(date.getDate() - 1);
      }
      el("streakCount").textContent = streak;
    }

    function renderDaily() {
      const done = (state.progress._daily || {})[todayKey] || 0;
      el("dailyDots").innerHTML = "";
      for (let i = 1; i <= DAILY_TARGET; i++) {
        const dot = document.createElement("div");
        dot.className = `dot ${i <= done ? "done" : ""}`;
        dot.textContent = i;
        el("dailyDots").appendChild(dot);
      }
    }

    function weakWords() {
      return words
        .map(item => ({ item, rec: getRecord(item.word) }))
        .filter(({ rec }) => rec.again > 0 || (rec.know + rec.spell === 0))
        .sort((a, b) => {
          const as = a.rec.again * 3 - a.rec.know - a.rec.spell;
          const bs = b.rec.again * 3 - b.rec.know - b.rec.spell;
          return bs - as;
        })
        .slice(0, 6);
    }

    function reportText() {
      const daily = state.progress._daily || {};
      const done = daily[todayKey] || 0;
      const entries = Object.entries(state.progress).filter(([key]) => !key.startsWith("_"));
      const learned = entries.filter(([, rec]) => rec.know > 0).length;
      const spelled = entries.filter(([, rec]) => rec.spell > 0).length;
      const weak = weakWords();
      const weakText = weak.length
        ? weak.map(({ item, rec }, index) => `${index + 1}. ${item.word}（${item.meaning}，再练${rec.again || 0}次）`).join("\n")
        : "暂无明显错词";
      return `英语练习报告 ${todayKey}
今日完成：${done}/${DAILY_TARGET}
累计认识：${learned}
累计拼对：${spelled}
需要关注：
${weakText}`;
    }

    function renderParentReport() {
      const daily = state.progress._daily || {};
      const done = daily[todayKey] || 0;
      const weak = weakWords();
      el("todayDone").textContent = `${done}/${DAILY_TARGET}`;
      el("weakCount").textContent = weak.length;
      el("weakList").innerHTML = "";
      weak.forEach(({ item, rec }) => {
        const li = document.createElement("li");
        li.textContent = `${item.word} - ${item.meaning}（再练 ${rec.again || 0}）`;
        el("weakList").appendChild(li);
      });
      if (!weak.length) {
        const li = document.createElement("li");
        li.textContent = "暂无明显错词";
        el("weakList").appendChild(li);
      }
    }

    function renderList() {
      el("wordList").innerHTML = "";
      if (state.mode !== "flash") {
        el("wordListTitle").textContent = "答案已隐藏";
        const guard = document.createElement("div");
        guard.className = "answer-guard";
        guard.textContent = state.mode === "spell"
          ? "拼写练习时隐藏英文词表，避免一眼看到答案。"
          : "认意思练习时隐藏词表，先靠自己判断。";
        el("wordList").appendChild(guard);
        return;
      }
      el("wordListTitle").textContent = "当前词表";
      state.filtered.slice(0, 80).forEach(item => {
        const rec = getRecord(item.word);
        const row = document.createElement("div");
        row.className = "list-item";
        row.innerHTML = `<span><strong>${item.word}</strong> <em>${item.meaning}</em></span><span>${rec.know + rec.spell}</span>`;
        row.addEventListener("click", () => {
          state.index = state.filtered.findIndex(w => w.word === item.word);
          renderMode();
        });
        el("wordList").appendChild(row);
      });
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        state.mode = tab.dataset.mode;
        renderMode();
      });
    });

    ["gradeFilter", "topicFilter", "orderMode"].forEach(id => el(id).addEventListener("change", resetFilter));
    el("speakBtn").addEventListener("click", () => speak(current().word));
    el("hideBtn").addEventListener("click", () => {
      state.hiddenMeaning = !state.hiddenMeaning;
      renderFlash();
    });
    el("knowBtn").addEventListener("click", () => {
      getRecord(current().word).know += 1;
      markDaily();
      saveProgress();
      next();
    });
    el("againBtn").addEventListener("click", () => {
      getRecord(current().word).again += 1;
      saveProgress();
      speak(current().word);
    });
    el("spellSpeakBtn").addEventListener("click", () => speak(current().example));
    el("checkSpellBtn").addEventListener("click", () => {
      const item = current();
      const answer = el("spellInput").value.trim().toLowerCase();
      if (answer === item.word.toLowerCase()) {
        el("spellFeedback").textContent = "拼对了！";
        getRecord(item.word).spell += 1;
        markDaily();
        saveProgress();
        setTimeout(next, 700);
      } else {
        el("spellFeedback").textContent = `差一点，正确拼写是 ${item.word}`;
        getRecord(item.word).again += 1;
        saveProgress();
      }
    });
    el("spellInput").addEventListener("keydown", event => {
      if (event.key === "Enter") el("checkSpellBtn").click();
    });
    el("copyReportBtn").addEventListener("click", async () => {
      const text = reportText();
      try {
        await navigator.clipboard.writeText(text);
        el("copyNote").textContent = "已复制，可以发给家长";
      } catch {
        el("copyNote").textContent = text;
      }
    });

    renderTopics();
    resetFilter();
    updateStats();
    renderDaily();
    renderParentReport();
  </script>
</body>
</html>
